<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Capture — Turn tribal knowledge into versioned playbooks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #FAFAF7;
      --bg-soft: #F4F3EE;
      --ink: #0F1412;
      --ink-2: #2A302E;
      --muted: #6B706E;
      --line: #E6E4DD;
      --line-2: #DCD9D0;
      --card: #FFFFFF;
      --accent: #0F766E;
      --accent-soft: #D7EBE7;
      --accent-ink: #064E46;
      --warn: #C2410C;
      --warn-soft: #FBE8D8;
      --ok: #166534;

      --pad: 1;                 /* density multiplier */
      --radius: 14px;
      --radius-sm: 10px;
    }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); }
    body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings:'ss01','cv11'; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    .display { font-family:'Inter Tight', 'Inter', sans-serif; letter-spacing:-0.02em; }
    .mono { font-family:'JetBrains Mono', ui-monospace, monospace; }

    ::selection { background: var(--accent); color: #fff; }
    a { color: inherit; }

    /* Reveal-on-scroll (subtle) */
    .reveal { opacity:0; transform: translateY(6px); transition: opacity .45s cubic-bezier(.2,.7,.2,1), transform .45s cubic-bezier(.2,.7,.2,1); }
    .reveal.in { opacity:1; transform: none; }
    @media (prefers-reduced-motion: reduce){ .reveal{opacity:1;transform:none;transition:none;} }
  </style>

  <script type="application/json" id="tweak-defaults">
  </script>
  <script>
    // Tweakable defaults live in a dedicated script block so we can rewrite them
    // via the edit-mode protocol without touching logic.
  </script>
  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "teal",
      "density": "compact",
      "sections": {
        "interview": true,
        "sop": true,
        "how": true,
        "features": true,
        "logos": true,
        "faq": true,
        "cta": true
      }
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/copy.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/nav.jsx"></script>
  <script type="text/babel" src="src/hero.jsx"></script>
  <script type="text/babel" src="src/slab-interview.jsx"></script>
  <script type="text/babel" src="src/slab-sop.jsx"></script>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
